name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun run lint

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          args: -o CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT: CHANGELOG.md

      - name: Bake version and commit
        run: |
          git checkout main
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          bun run format
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md package.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): prepare for ${{ github.ref_name }}"
          git push

  build:
    name: Build (${{ matrix.runner }})
    needs: quality
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: darwin-arm64
          - runner: ubuntu-latest
            target: linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - run: bun run build
        env:
          KONDOR_VERSION: ${GITHUB_REF_NAME#v}

      - name: Create archive
        run: tar -czf kondor-${{ matrix.target }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v7
        with:
          name: kondor-${{ matrix.target }}
          path: kondor-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: archives
          pattern: kondor-*

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Collect archives
        run: |
          mkdir -p release-assets
          find archives -name "*.tar.gz" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          body_path: ${{ steps.git-cliff.outputs.changelog }}
          generate_release_notes: false

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: andenkondor/homebrew-zapfhahn
          token: ${{ secrets.COMMITTER_TOKEN }}
          path: homebrew-tap

      - name: Download archives and compute SHA256
        id: shas
        run: |
          VERSION=${{ steps.extract_version.outputs.VERSION }}
          mkdir -p release-assets
          gh release download "v${VERSION}" --repo "${{ github.repository }}" --pattern "kondor-*.tar.gz" --dir release-assets
          for target in darwin-arm64 linux-x64 linux-arm64; do
            sha=$(sha256sum "release-assets/kondor-${target}.tar.gz" | cut -d' ' -f1)
            echo "${target}=${sha}" >> $GITHUB_OUTPUT
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update formula
        working-directory: homebrew-tap
        run: |
          VERSION=${{ steps.extract_version.outputs.VERSION }}
          SHA_DARWIN_ARM64=${{ steps.shas.outputs.darwin-arm64 }}
          SHA_LINUX_X64=${{ steps.shas.outputs.linux-x64 }}
          SHA_LINUX_ARM64=${{ steps.shas.outputs.linux-arm64 }}

          cat > Formula/kondor.rb <<EOF
          class Kondor < Formula
            desc "Full-text search"
            version "$VERSION"

            on_macos do
              url "https://github.com/andenkondor/kondor/releases/download/v${VERSION}/kondor-darwin-arm64.tar.gz"
              sha256 "${SHA_DARWIN_ARM64}"
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/andenkondor/kondor/releases/download/v${VERSION}/kondor-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/andenkondor/kondor/releases/download/v${VERSION}/kondor-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            depends_on "oven-sh/bun/bun"
            depends_on "ripgrep"
            depends_on "bat"
            depends_on "fzf"

            def install
              libexec.install Dir["*"]
              (bin/"kd").write <<~EOS
                #!/bin/bash
                exec "#{Formula["oven-sh/bun/bun"].opt_bin}/bun" run "#{libexec}/index.js" "\$@"
              EOS
            end
          end
          EOF

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Formula/kondor.rb
          git commit -m "kondor ${VERSION}"
          git push
